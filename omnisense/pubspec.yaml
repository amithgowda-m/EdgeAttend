name: omnisense
description: OmniSense Command Center — IoT Security Dashboard for EdgeAttend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.1

  # Local Notifications
  flutter_local_notifications: ^17.2.3

  # Charts
  fl_chart: ^1.2.0

  # Fonts & UI
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Utils
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
